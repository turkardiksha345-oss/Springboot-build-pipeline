name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      REGISTRY: dikshat1024/democicd

    steps:
      # ✅ Checkout the repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔹 Debug Environment
      - name: Debug Environment
        run: |
          echo "USER: $(whoami)"
          echo "HOST: $(hostname)"
          which mvn || echo "mvn not found"
          java -version

      # 🔹 Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🔹 Build
      - name: Build
        run: |
          mvn clean package -DskipTests

      # 🔹 Code Coverage with JaCoCo
      - name: Code Coverage
        run: mvn jacoco:report
          
      # 🔹 SCA (Dependency Check)
      - name: Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -Dformat=ALL -DfailOnError=false

      # 🔹 SAST (SonarQube)
      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.dependencyCheck.jsonReportPath=target/dependency-check-report.json \
            -Dsonar.dependencyCheck.htmlReportPath=target/dependency-check-report.html \
            -Dsonar.projectName=wezvatech

      # 🔹 Quality Gate
      - name: Sonar Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          scanMetadataReportFile: target/sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 🔹 Docker Login
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 🔹 Build & Push Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY:latest .
          docker push $REGISTRY:latest

      # 🔹 Scan Docker Image with Trivy
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $REGISTRY:latest

      # 🔹 Smoke Test
      - name: Smoke Test
        run: |
          docker run -d --name smokerun -p 8080:8080 $REGISTRY:latest
          sleep 60
          chmod +x check.sh
          ./check.sh
          docker rm -f smokerun
