name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: dikshat1024/democicd

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Java
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # Build
    - name: Build Jar
      run: mvn clean package

    # Code Coverage
    - name: Generate JaCoCo Report
      run: mvn jacoco:report

    # OWASP Dependency Check
    - name: OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check

    # SonarQube Scan
    - name: SonarQube Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        mvn sonar:sonar \
        -Dsonar.projectName=wezvatech \
        -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
        -Dsonar.dependencyCheck.jsonReportPath=target/dependency-check-report.json \
        -Dsonar.dependencyCheck.htmlReportPath=target/dependency-check-report.html \
        -Dsonar.login=$SONAR_TOKEN \
        -Dsonar.host.url=$SONAR_HOST_URL

    # Quality Gate
    - name: SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
      timeout-minutes: 1
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # Docker Login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Image
    - name: Build Docker Image
      run: docker build -t $REGISTRY:latest .

    # Push Image
    - name: Push Docker Image
      run: docker push $REGISTRY:latest

    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb stable main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    # Scan Image
    - name: Scan Docker Image
      run: trivy image --scanners vuln --offline-scan $REGISTRY:latest > trivyresults.txt

    # Run Container
    - name: Run Container
      run: docker run -d --name smokerun -p 8080:8080 $REGISTRY:latest

    # Smoke Test
    - name: Smoke Test
      run: |
        sleep 90
        chmod +x check.sh
        ./check.sh

    # Cleanup
    - name: Cleanup Container
      run: docker rm -f smokerun
